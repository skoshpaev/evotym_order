# TEST PROJECT ONLY: ENV VALUES AND BUILT-IN CREDENTIALS IN THIS FILE ARE COMMITTED ONLY TO KEEP THE LOCAL TEST STACK SELF-CONTAINED.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/order
    environment:
      APP_ENV: dev
      APP_DEBUG: "0"
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      DATABASE_URL: "mysql://order:order@mysql:3306/order?serverVersion=8.0.36&charset=utf8mb4"
    volumes:
      - ./:/workspace/order
      - composer-cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
    command: ["php-fpm"]
    networks:
      - default
      - shared

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/order
    environment:
      APP_ENV: dev
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      DATABASE_URL: "mysql://order:order@mysql:3306/order?serverVersion=8.0.36&charset=utf8mb4"
    volumes:
      - ./:/workspace/order
      - composer-cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
    command: ["php", "bin/console", "messenger:consume", "product_updated", "order_processing_status", "--time-limit=3600", "--memory-limit=128M", "--no-interaction", "-vv"]
    restart: unless-stopped
    networks:
      - default
      - shared

  publisher:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/order
    environment:
      APP_ENV: dev
      APP_DEBUG: "0"
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      DATABASE_URL: "mysql://order:order@mysql:3306/order?serverVersion=8.0.36&charset=utf8mb4"
    volumes:
      - ./:/workspace/order
      - composer-cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
    command: ["sh", "-lc", "while true; do php bin/console app:publish-outbox; sleep 60; done"]
    restart: unless-stopped
    networks:
      - default
      - shared

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8082:80"
    volumes:
      - ./:/workspace/order:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8.0
    environment:
      # TEST PROJECT ONLY: THESE MYSQL CREDENTIALS ARE COMMITTED ONLY FOR LOCAL DEMO/QA CONVENIENCE.
      MYSQL_DATABASE: order
      MYSQL_USER: order
      MYSQL_PASSWORD: order
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  composer-cache:
  mysql-data:

networks:
  shared:
    name: evotym_shared
